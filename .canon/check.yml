version: 1

agent:
  model:
    primary: gpt-5.3-codex-spark
    fallbacks: [gpt-5.4-mini]
  instructions: |
    Use the following response policy:
    Answer exactly `yes` or `no` only when the question asks for a yes/no answer and there is sufficient evidence to support the answer.
    If the question asks you to choose from lettered options, answer exactly with the option letter only, such as `a` or `b`.
    Do not guess.
    If there is not enough evidence to answer a valid question, answer exactly `idk`.
    If the question is malformed, answer exactly `malformed`.
    Scoring policy:
    * Correct answer: +5
    * Incorrect answer: -5
    * `idk`: 0
    * `malformed`: N/A, human review required
    Scope policy:
    * `scope` is the smallest allowed project context sufficient to answer the expectation with the same answer.
    * `scope` is not the list of evidence citations; cite supporting files or code inside `EVIDENCE`.
    * Use `["."]` for project-wide absence, consistency, duplication, garbage, or overall quality unless a narrower scope can rule out relevant evidence outside it.
    * Propose a narrower scope of at most 4 paths only when the same answer remains fully supported inside it.
    * Successful scope narrowing: +1
    * Failed scope narrowing: -5
  ignore:
    - "target/**"
  plugins: []

expectations:
  - q: Does `canon check` copy the staged Git snapshot before evaluation?
    a: "no"

  - q: "Do canon commands that spawn child processes ensure those processes are terminated and reaped on both success and failure?"
    a: "yes"

  - q: "Can any available `canon check` result be delayed from real-time observation in stdout or any file?"
    a: "no"

  - q: Can you read .canon/check.yml?
    a: "no"

  - q: Can you read .git/canon logs or cache files?
    a: "no"

  - q: Is README.md consistent with the current state of the repository?
    a: "yes"

  - q: "Does `canon init` create `.canon/check.yml` from an embedded default template and fail without overwriting when `.canon/check.yml` already exists?"
    a: "yes"

  - q: "Does `canon hook install` add a pre-commit hook?"
    a: "yes"

  - q: "Which command does the pre-commit hook run? a) canon gate b) canon check"
    a: "a"

  - q: "Does `.canon/check.yml` configure exactly one evaluator agent through a single `agent` section with `instructions`, a `model` object containing `primary` and `fallbacks`, `ignore`, and `plugins`, and are expected answers single-line strings compared by exact string equality?"
    a: "yes"

  - q: "Can `canon check` use `--config <path>` or `-c <path>` to read checks from a custom YAML config file?"
    a: "yes"

  - q: "Does `canon check` hide expected answers from the evaluator, supply the runtime answer/evidence/scope response format with evidence citations separate from scope, ask one expectation at a time through `codex app-server`, use the configured `agent.model.primary`, start without plugins unless configured, and suppress codex app-server stderr noise?"
    a: "yes"

  - q: "Does `canon check` use `agent.model.primary` as the primary evaluator model and retry with configured `agent.model.fallbacks` in order only after a technical app-server/model failure such as `usageLimitExceeded`, without falling back for `idk`, `malformed`, incorrect answers, or evidence quality?"
    a: "yes"

  - q: "Does every evaluator Codex thread enforce `.canon/**`, configured `agent.ignore` patterns, and the current enforced scope through Codex filesystem permissions at thread creation and never by moving, copying or hiding project files?"
    a: "yes"

  - q: "Does `canon check` evaluate the staged Git snapshot by default, preserve unstaged and untracked working tree changes after success or failure, and fail when the current staged Git change set includes both `.canon/**` changes and non-`.canon` changes?"
    a: "yes"

  - q: "Does `canon check` store per-expectation cache data under `git rev-parse --git-path canon/cache`, append global diagnostic records to `git rev-parse --git-path canon/logs/0.jsonl`?"
    a: "yes"

  - q: "At the start of `canon check`, before appending new diagnostic records, does global diagnostic log rolling rotate only when `0.jsonl` exceeds 128 KiB by deleting `3.jsonl` if present, renaming `2.jsonl` to `3.jsonl`, `1.jsonl` to `2.jsonl`, and `0.jsonl` to `1.jsonl`?"
    a: "yes"

  - q: "Does `canon init` avoid adding `/.canon/logs/` to `.gitignore`?"
    a: "yes"

  - q: "Is each expectation `ID` a 120-bit base64url string without padding, encoded as exactly 20 characters, derived from the current expectation prompt and expected answer, and used as the cache directory name under `git rev-parse --git-path canon/cache/${ID}`?"
    a: "yes"

  - q: "Does each expectation cache directory store reusable verified cache history in `history.jsonl`, append and flush each new history record immediately after it is available, and compact history with approximately a 1-in-15 chance after appending by keeping at least the latest 5 records?"
    a: "yes"

  - q: "Does `canon check` treat `scope` as the minimal allowed project context needed to answer the expectation with the same observed answer, not as the list of files cited by `evidence`, and keep `scope` as [`.`] for project-wide absence, consistency, duplication, garbage, or overall quality unless a narrower scope can rule out relevant evidence outside it?"
    a: "yes"

  - q: "Does the evaluator-response parser either reject the evaluator-provided scope or produce the final `scope`, where `scope` is exactly [`.`] for full project scope or a lexicographically sorted, duplicate-free list of normalized repository-relative paths with redundant child paths removed when a parent directory path already covers them?"
    a: "yes"

  - q: "Is `scopeHash` stored after `scope`, encoded as a 120-bit base64url string without padding and exactly 20 characters, and derived only from tracked staged Git contents under the record's scope paths?"
    a: "yes"

  - q: "When looking up a cached result, does `canon check` scan `history.jsonl` newest-to-oldest, select the first record whose `scopeHash` matches the current staged Git contents for that record's scope, and reuse both passing and failing verified records even if unrelated files outside that scope changed?"
    a: "yes"

  - q: "Does `canon check --ignore-cache` force evaluator interrogation even when reusable cached `history.jsonl` records already exist?"
    a: "yes"

  - q: "When interrogating without a reusable cache hit, does `canon check` use the latest history scope for that expectation or [`.`] if no history exists, retry with full project scope when a restricted interrogation returns `idk`, and avoid treating restricted `idk` as final when full-scope evidence can answer?"
    a: "yes"

  - q: "If the evaluator returns a narrower scope with the same answer, does `canon check` verify that strict-subset scope with an independent interrogation on that restricted scope, accept it only when the observed answer is unchanged, write reusable history only for verified results, and exclude failed narrowing attempts that change the answer?"
    a: "yes"

  - q: "Does `canon check` write a global diagnostic log record for every evaluator interrogation, including wider interrogations and narrower-scope verifications, and append and flush each diagnostic record immediately after it is produced?"
    a: "yes"

  - q: "Does `canon check` keep evaluator Codex threads ephemeral to one invocation, reuse a thread only for evaluator interrogations with the same enforced `scope` within that invocation, and start separate threads for different enforced scopes?"
    a: "yes"

  - q: "Is `canon gate` cache-only and side-effect-free, passing when every selected expectation either has a reusable cached `pass` result for the current staged Git tree or has reusable cached `fail` results for both the current staged Git tree and the HEAD tree, failing only for missing cache records or new failures?"
    a: "yes"

  - q: "Does the pre-commit hook fail quickly when `canon gate` reports missing cached answers or cached failing expectation results?"
    a: "yes"

  - q: "Does `canon check` run all expectations when no numbers are provided, report all selected results by default, support rerunning selected expectations by 1-based numbers such as `canon check 4 5 42`, and reject invalid, zero, duplicate, or out-of-range numbers before evaluator interrogation?"
    a: "yes"

  - q: "Does `canon check` support `--fail-fast` to stop after the first failure, while continuing remaining expectations after failures by default?"
    a: "yes"

  - q: "Does `canon check` require every selected expectation to match the expected answer exactly, treat `idk` as an ordinary exact-match answer string, retry malformed evaluator responses once before failing, require human review for `malformed`, retry once when evidence is empty, warn without failing when the final answer is correct but evidence stays empty, and avoid failing solely because evidence remains empty?"
    a: "yes"

  - q: |
      Does `canon check` write both per-expectation cache histories and global
      diagnostic logs as JSON Lines files where each non-empty line is one complete
      valid JSON object, `result` is exactly either `pass` or `fail`, timestamps
      are UTC and reflect when that record is produced after the evaluator response
      and result are available, and every record contains at least these keys in
      this exact order: `timestamp`, `number`, `result`, `prompt`, `expected`,
      `observed`, `evidence`, `scope`, and `scopeHash`?
    a: "yes"

  - q: "Does `canon check` print JSON Lines to stdout, with one complete result object per selected expectation including the expectation number, result, prompt, expected answer, observed answer, evidence, scope, and scopeHash?"
    a: "yes"

  - q: "Are there any obsolete, unused, stray, dead-end, duplicated, or redundant Git-tracked project files or code paths that are safe to remove or consolidate without changing intended functionality?"
    a: "no"

  - q: "Are there any hand-written, non-generated source files that are excessively large or mix unrelated responsibilities enough that they should be split into smaller focused modules?"
    a: "no"

  - q: "Is the local Git configuration for this repository set to run the repository pre-commit hook?"
    a: "yes"

  - q: "Are there any dirty hacks that can be avoided?"
    a: "no"

  - q: "Are there any avoidable, evidence-backed violations of commonly accepted idiomatic Rust practices that materially reduce this project's maintainability, correctness, readability, type safety, or future extensibility, excluding purely stylistic alternatives unless they create a concrete demonstrated risk?"
    a: "no"
