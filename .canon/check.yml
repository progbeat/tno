version: 1

agent:
  model:
    primary: gpt-5.4-mini
    fallbacks: [gpt-5.3-codex-spark]
  thinking: medium  # off | minimal | low | medium | high | xhigh | adaptive | max
  plugins: []
  ignore:
    - ".canon/**"  # prevents evaluator agents from reading expected answers and avoids reevaluating full-scope expectations when canon changes
    - "target/**"
    - "research/**"
  instructions: |
    Prefer `rg` and `rg --files` for text and file searches; fall back cleanly if unavailable.
    Parallelize independent read-only inspections with `multi_tool_use.parallel` when practical, especially `cat`, `rg`, `sed`, `ls`, `git show`, `nl`, and `wc`.
    Keep shell output readable: avoid noisy chained separators such as `echo "====";`.
    Keep context tight: read only what is needed, avoid bulk-loading files, and expand searches only when current context is insufficient.
    Use the following response policy:
    Answer exactly `yes` or `no` only when the question asks for a yes/no answer and there is sufficient evidence to support the answer.
    If the question asks you to choose from lettered options, answer exactly with the option letter only, such as `a` or `b`.
    Do not guess.
    If there is not enough evidence to answer a valid question, answer exactly `idk`.
    If the question is malformed, answer exactly `malformed`.
    Scope policy:
    * `scope` is the minimal subset of the visible staged Git-tracked snapshot whose unchanged contents make the correct answer invariant to changes outside it.
    * If the allowed scope is narrower than the context required to determine the correct answer among all valid answers, answer exactly `idk`.
    * Propose a narrower scope only when that narrower scope is sufficient to determine the correct answer among all valid answers.
    Scoring policy:
    * Correct answer: +5
    * Incorrect answer: -10
    * `idk`: -1 + retry on full project scope
    * `malformed`: N/A, human review required
    * Successful scope narrowing: +1
    * Failed scope narrowing: -5

expectations:
  - include: expects/*.yml

  # Documentation
  - q: Is README.md consistent with the current state of the repository?
    a: "yes"
    cooldown: 1d

  # Access control
  - q: Can you read .canon/check.yml?
    a: "no"
    cooldown: 3d

  - q: Can you read any files under CANON_STATE_DIR?
    a: "no"  # because these files aren't required to answer these questions
    cooldown: 3d

  - q: "Can you write to any paths right now?"
    a: "no"
    cooldown: 3d

  - q: "Does every evaluator Codex thread enforce configured `agent.ignore` patterns and the current enforced scope through Codex filesystem permissions at thread creation?"
    a: "yes"
    cooldown: 3d

  - q: "Does `canon` read runtime logs?'"
    a: "no"  # because it's hack
    cooldown: 3d

  # Persistent state management
  - q: "Let CANON_STATE_DIR=$(git rev-parse --git-path canon). Does every canon command store all canon-owned non-temporary persistent state under CANON_STATE_DIR?"
    a: "yes"
    cooldown: 7d
    thinking: low

  # Check configuration
  - q: "Does `.canon/check.yml` configure exactly one evaluator agent through a single `agent` section with `instructions`, a `model` object containing `primary` and `fallbacks`, `ignore`, and `plugins`, and are expected answers single-line strings compared by exact string equality?"
    a: "yes"

  - q: "Can `canon check` use `--config <path>` or `-c <path>` to read checks from a custom YAML config file?"
    a: "yes"

  - q: "Does `canon check` use `agent.model.primary` as the primary evaluator model and retry with configured `agent.model.fallbacks` in order only after a technical app-server/model failure such as `usageLimitExceeded`, without falling back for `idk`, `malformed`, incorrect answers, or evidence quality?"
    a: "yes"

  # Init and hooks
  - q: "Does `canon init` create `.canon/check.yml` from an embedded default template and fail without overwriting when `.canon/check.yml` already exists?"
    a: "yes"

  - q: "Does `canon hook install` add a pre-commit hook?"
    a: "yes"

  - q: "Which command does the pre-commit hook run? a) canon gate b) canon check"
    a: "a"

  - q: "Is the local Git configuration for this repository set to run the repository pre-commit hook?"
    a: "yes"
    cooldown: 7d

  - q: "Does the pre-commit hook fail quickly when `canon gate` reports missing cached answers or cached failing expectation results?"
    a: "yes"

  # Process cleanup
  - q: "Do canon commands that spawn child processes ensure those processes are terminated and reaped on both success and failure?"
    a: "yes"
    cooldown: 7d

  # Output and selection
  - q: "Can `canon check <PREFIX>...` select one or more expectations by unique ID prefix, including full IDs?"
    a: "yes"

  - q: "For an expectation that defines only `q` and `a`, when `canon check -q <q>` and `canon check <ID> --ignore-cache` select the same expectation using the same check config and enforced scope, is the complete first-turn evaluator-model input identical before the evaluator answers?"
    a: "yes"

  - q: "When no expectation selectors are provided, do `canon` commands end up with the same final selected expectation set?"
    a: "yes"

  - q: "|selected| + |skipped| == |all expectations|?"
    a: "yes"

  - q: "When no expectation selectors are provided, are expectations with cached passing results still selected?"
    a: "no"

  - q: "Are expectation ID prefixes limited to human-readable output and CLI selection, with all non-temporary persistent state under CANON_STATE_DIR storing expectation references by full ID rather than minimal or user-provided prefixes?"
    a: "yes"

  - q: "Does every `canon` command write and flush each next piece of stdout or stderr as soon as that piece is computed, rather than waiting for later work or command completion?"
    a: "yes"

  # Expectations from specs
  - path: "specs/*.md"
    q_template: |
      {content}
      ---
      Does the implementation fully satisfy this specification?
    a: "yes"
