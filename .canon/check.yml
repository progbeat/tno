version: 1

agent:
  model:
    primary: gpt-5.3-codex-spark
    fallbacks: [gpt-5.4-mini]
  thinking: medium  # off | minimal | low | medium | high | xhigh | adaptive | max
  plugins: []
  ignore:
    - "target/**"
  instructions: |
    Use the following response policy:
    Answer exactly `yes` or `no` only when the question asks for a yes/no answer and there is sufficient evidence to support the answer.
    If the question asks you to choose from lettered options, answer exactly with the option letter only, such as `a` or `b`.
    Do not guess.
    If there is not enough evidence to answer a valid question, answer exactly `idk`.
    If the question is malformed, answer exactly `malformed`.
    Scope policy:
    * `scope` is the smallest allowed project context sufficient to determine the correct answer to the question among all valid answers, not merely to support the answer you gave.
    * `scope` is not the list of evidence citations; cite supporting files or code inside `EVIDENCE`.
    * Do not choose `scope` because it happens to support your observed answer; choose the scope that would let an evaluator decide the question correctly without relying on inaccessible files.
    * `scope` must be `["."]` for questions about project-wide search, absence, consistency, duplication, garbage, overall quality, architectural debt, idiomaticity, or repository-wide maintainability, unless the question explicitly limits itself to narrower paths.
    * If the allowed scope is narrower than the context required to determine the correct answer among all valid answers, answer exactly `idk`.
    * Propose a narrower scope of at most 4 paths only when that narrower scope is sufficient to determine the correct answer among all valid answers.
    Scoring policy:
    * Correct answer: +5
    * Incorrect answer: -10
    * `idk`: -1 + retry on full project scope
    * `malformed`: N/A, human review required
    * Successful scope narrowing: +1
    * Failed scope narrowing: -5

expectations:
  # Project quality
  - q: "Can you find any unnecessary copy-pasted code outside tests?"
    a: "no"
    cooldown: 7d
    thinking: xhigh

  - q: "With bounded configuration and retained data, is non-temporary project-owned persistent state across the whole project practically size-bounded across repeated normal command runs and configuration changes without manual cleanup?"
    a: "yes"
    cooldown: 7d

  - q: "Does the project avoid repeating expensive deterministic operations within a single high-level operation by reusing results keyed by all inputs that can affect them, including repository inspections, filesystem reads, parsed data, and derived hashes?"
    a: "yes"
    cooldown: 7d

  - q: "Are there any obsolete, unused, stray, dead-end, duplicated, or redundant Git-tracked project files or code paths that are safe to remove or consolidate without changing intended functionality?"
    a: "no"
    cooldown: 7d
    thinking: xhigh

  - q: "Are there any hand-written, non-generated source files that are excessively large or mix unrelated responsibilities enough that they should be split into smaller focused modules?"
    a: "no"
    cooldown: 7d
    thinking: xhigh

  - q: "Are there any dirty hacks that can be avoided?"
    a: "no"
    cooldown: 7d
    thinking: xhigh

  - q: "Does the project avoid unnecessary unsafe code?"
    a: "yes"
    cooldown: 7d
    thinking: xhigh

  - q: "Are there any avoidable, violations of commonly accepted idiomatic Rust practices that materially reduce this project's maintainability, correctness, readability, type safety, or future extensibility, excluding purely stylistic alternatives unless they create a concrete demonstrated risk?"
    a: "no"
    cooldown: 7d
    thinking: xhigh

  # Documentation
  - q: Is README.md consistent with the current state of the repository?
    a: "yes"
    cooldown: 1d

  # Access control
  - q: Can you read .canon/check.yml?
    a: "no"

  - q: Can you read .git/canon logs or cache files?
    a: "no"

  - q: "Can you write to any paths right now?"
    a: "no"
    cooldown: 3d

  - q: "Does every evaluator Codex thread enforce `.canon/**`, configured `agent.ignore` patterns, and the current enforced scope through Codex filesystem permissions at thread creation and never by moving or copying project files?"
    a: "yes"

  # Check configuration
  - q: "Does `.canon/check.yml` configure exactly one evaluator agent through a single `agent` section with `instructions`, a `model` object containing `primary` and `fallbacks`, `ignore`, and `plugins`, and are expected answers single-line strings compared by exact string equality?"
    a: "yes"

  - q: "Can `canon check` use `--config <path>` or `-c <path>` to read checks from a custom YAML config file?"
    a: "yes"

  - q: "Does `canon check` use `agent.model.primary` as the primary evaluator model and retry with configured `agent.model.fallbacks` in order only after a technical app-server/model failure such as `usageLimitExceeded`, without falling back for `idk`, `malformed`, incorrect answers, or evidence quality?"
    a: "yes"

  # Init and hooks
  - q: "Does `canon init` create `.canon/check.yml` from an embedded default template and fail without overwriting when `.canon/check.yml` already exists?"
    a: "yes"

  - q: "Does `canon hook install` add a pre-commit hook?"
    a: "yes"

  - q: "Which command does the pre-commit hook run? a) canon gate b) canon check"
    a: "a"

  - q: "Is the local Git configuration for this repository set to run the repository pre-commit hook?"
    a: "yes"
    cooldown: 7d

  - q: "Does the pre-commit hook fail quickly when `canon gate` reports missing cached answers or cached failing expectation results?"
    a: "yes"

  # Snapshot isolation
  - q: Does `canon check` copy the staged Git snapshot before evaluation?
    a: "no"
    cooldown: 3d

  - q: "Does `canon check` evaluate the staged Git snapshot by default, preserve unstaged and untracked working tree changes after success or failure, and fail when the current staged Git change set includes both `.canon/**` changes and non-`.canon` changes?"
    a: "yes"

  - q: "Do canon commands that spawn child processes ensure those processes are terminated and reaped on both success and failure?"
    a: "yes"
    cooldown: 7d

  # Output and selection
  - q: "Does `canon check` write and flush every non-skipped per-expectation stdout result, reusable history record, and runtime log event as soon as that result or record is produced?"
    a: "yes"
    cooldown: 3d

  - q: "Does `canon check` consider all expectations when no numbers are provided, report newly evaluated results and all failing results by default while counting reused passing results as skipped without per-expectation stdout, support rerunning selected expectations by 1-based numbers such as `canon check 4 5 42`, and reject invalid, zero, duplicate, or out-of-range numbers before evaluator interrogation?"
    a: "yes"

  - q: "Does `canon check` support `--fail-fast` to stop after the first failure, while continuing remaining expectations after failures by default?"
    a: "yes"

  - q: "For an expectation that defines only `q` and `a`, when `canon check -q <q>` and `canon check <NUMBER> --ignore-cache` use the same check config and the same enforced scope, is the complete first-turn evaluator-model input identical before the evaluator answers?"
    a: "yes"

  - q: "When no expectation numbers are provided, do `canon` commands end up with the same final selected expectation set?"
    a: "yes"

  - q: "|selected| + |skipped| == |all expectations|?"
    a: "yes"

  - q: "When no expectation numbers are provided, are expectations with cached passing results still selected?"
    a: "yes"

  # Scope handling
  - q: "Does `canon check` treat `scope` as the minimal allowed project context needed to answer the expectation with the same observed answer, not as the list of files cited by `evidence`, and keep `scope` as [`.`] for project-wide absence, consistency, duplication, garbage, or overall quality unless a narrower scope can rule out relevant evidence outside it?"
    a: "yes"

  - q: "Does the evaluator-response parser either reject the evaluator-provided scope or produce the final `scope`, where `scope` is exactly [`.`] for full project scope or a lexicographically sorted, duplicate-free list of normalized repository-relative paths with redundant child paths removed when a parent directory path already covers them?"
    a: "yes"

  - q: "Does `canon check` keep evaluator Codex threads ephemeral to one invocation, reuse a thread only for evaluator interrogations with the same enforced `scope` within that invocation, and start separate threads for different enforced scopes?"
    a: "yes"

  # Expectations from specs
  - path: "specs/*.md"
    q_template: |
      {content}
      ---
      Does the implementation fully satisfy this specification?
    a: "yes"
