version: 1

instructions: |
  Use the following response policy:
  Answer exactly `yes` or `no` only when there is sufficient evidence to support the answer.
  Do not guess.
  If there is not enough evidence to answer `yes` or `no`, answer exactly `skip`.
  If question is malformed, answer exactly `malformed`.
  Scoring policy:
  * Correct answer: `+1`
  * Incorrect answer: `-1`
  * Skip: `0`

agents:
  Smith:
    ignore:
      - "target/**"
    plugins: []

expectations:
  - q: Is README.md consistent with the current state of the repository?
    a: "yes"

  - q: "Does `canon init` create .canon/check.yml?"
    a: "yes"

  - q: "Does `canon hook install` add a precommit hook?"
    a: "yes"

  - q: "Does `canon init` fail if .canon/check.yml already exists?"
    a: "yes"

  - q: "Does `canon init` create .canon/check.yml from an embedded default template?"
    a: "yes"

  - q: "Are expected answers single-line strings compared by exact string equality?"
    a: "yes"

  - q: "Does `canon check` hide expected answers from evaluator agents?"
    a: "yes"

  - q: "Are evaluator agents configured with explicit ignore patterns and plugin lists?"
    a: "yes"

  - q: "Does each evaluator agent support an `ignore` list that defines additional files or directories the agent must not read?"
    a: "yes"

  - q: "Does each evaluator agent support a `plugins` list that defines which Codex plugins may be loaded for that agent?"
    a: "yes"

  - q: "Does `canon check` always add `.canon/**` to every evaluator agent's effective ignore patterns, even when it is not listed explicitly in the agent configuration?"
    a: "yes"

  - q: "Does `canon check` enforce ignored paths by configuring Codex filesystem permissions for codex app-server, rather than by copying files into a temporary evaluator workspace?"
    a: "yes"

  - q: "Does `canon check` deny evaluator-agent read access to `.canon/**` through Codex filesystem permissions?"
    a: "yes"

  - q: "Does `canon check` deny evaluator-agent read access to every configured `ignore` pattern through Codex filesystem permissions?"
    a: "yes"

  - q: "Does `canon check` avoid creating a filtered temporary workspace solely to hide `.canon/**` or other ignored files from evaluator agents?"
    a: "yes"

  - q: "Does `canon check` supply the runtime answer format during interrogation?"
    a: "yes"

  - q: "Does `canon check` ask one expectation at a time?"
    a: "yes"

  - q: "Does `canon check` reuse the same Codex session for all selected expectations for a given agent?"
    a: "yes"

  - q: "Does `canon check` use codex app-server to communicate with agents?"
    a: "yes"

  - q: "Does `canon check` run all expectations when no numbers are provided?"
    a: "yes"

  - q: "Does `canon check` support rerunning selected expectations by 1-based numbers such as canon check 4 5 42?"
    a: "yes"

  - q: "Does `canon check` reject invalid, zero, duplicate, or out-of-range expectation numbers before starting evaluator agents?"
    a: "yes"

  - q: "Does `canon check` require every selected expectation to be answered correctly by every configured agent?"
    a: "yes"

  - q: "Does `canon check` treat skip as incorrect unless the expected answer is exactly skip?"
    a: "yes"

  - q: "Does `canon check` retry a malformed evaluator response once before failing?"
    a: "yes"

  - q: "Does `canon check` fail immediately when the evaluator response is malformed?"
    a: "no"

  - q: "Does `canon check` retry once when evidence is empty, then warn without failing if the answer is correct?"
    a: "yes"

  - q: "Does `canon check` fail solely because evidence remains empty after retry?"
    a: "no"

  - q: "Does the report include expectation number, agent name, prompt, expected answer, observed answer, and evidence?"
    a: "yes"

  - q: "Does `canon check` fail when the current Git change set includes both .canon/** changes and non-.canon changes?"
    a: "yes"

  - q: "Are old logs in .canon/logs removed when the total size exceeds 100MB or the number of logs exceeds 10?"
    a: "yes"

  - q: "If evaluator agent answers that the question is `malformed`, is human review required to fix the expectation or prompt?"
    a: "yes"

  - q: "Does `canon init` add /.canon/logs/ to .gitignore?"
    a: "no"

  - q: "Are timestamps in logs UTC?"
    a: "yes"

  - q: |
      Does `canon check` write interrogation logs to `.canon/logs/` as JSON Lines files
      with filenames matching `YYYYMMDD-HHMMSS.jsonl`, where each non-empty line is
      one complete valid JSON object representing one expectation-agent check result,
      `result` is exactly either `pass` or `fail`, and every record contains at least
      these keys in this exact order: `timestamp`, `number`, `result`, `agent`,
      `prompt`, `expected`, `observed`, and `evidence`?
    a: "yes"

  - q: "Does `canon check` suppress codex app-server stderr noise, such as WARN messages from codex_core_skills::loader?"
    a: "yes"

  - q: "Does `canon check` start the codex app-server without loading any plugins unless explicitly configured?"
    a: "yes"

  - q: "Does `canon check` by default check all selected expectations and report all results?"
    a: "yes"

  - q: "Does `canon check` support a --fail-fast flag to stop and exit immediately after the first expectation fails?"
    a: "yes"

  - q: "Does `canon check` continue checking remaining expectations when a failure occurs without --fail-fast?"
    a: "yes"

  - q: "Does `canon check` write each log record to the JSONL file immediately after it is produced, without buffering?"
    a: "yes"

  - q: "Does `canon check` flush the log file after each expectation-agent check record is written?"
    a: "yes"

  - q: "Does `canon check` allow real-time log observation via `tail -f .canon/logs/YYYYMMDD-HHMMSS.jsonl` during interrogation?"
    a: "yes"

  - q: "Does `canon check` print one line per expectation as `<number>. OK` or `<number>. FAIL`?"
    a: "yes"
