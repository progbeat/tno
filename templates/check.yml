version: 1

agent:
  model:
    primary: gpt-5.4-mini
    fallbacks:
      - gpt-5.3-codex-spark
  thinking: medium  # off | minimal | low | medium | high | xhigh | adaptive | max
  ignore: []
  plugins: []

expectations:
  # - include: expects/*.yml

  # Expectations from specs:
  # - path: "specs/*.md"
  #   q_template: |
  #     {content}
  #     ---
  #     Does the implementation fully satisfy this specification?
  #   a: "yes"

  # Replace this starter expectation after inspecting the project. Keep the
  # first canon small: a few objective checks for important user-facing behavior
  # are more useful than broad generic quality questions.
  - q: "Does README.md explain what this project is for?"
    a: "yes"

  - q: "Does README.md describe how a new user can run, use, or verify the project?"
    a: "yes"

  - q: "Does README.md document at least one user-facing command, API, app entry point, or workflow?"
    a: "yes"
