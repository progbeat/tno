name: Audit Status

on:
  push:
  pull_request:

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked --version 0.22.1
      - run: cargo audit --deny warnings
