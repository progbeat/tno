[package]
name = "canon"
version = "0.1.0"
edition = "2021"
description = "Thread-scoped canon for coding agents"
license = "MIT"
repository = "https://github.com/progbeat/canon"

[dependencies]
globset = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tempfile = "3"
walkdir = "2"
